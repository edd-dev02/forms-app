<h2>Páginas</h2>
<hr>

<h3 class="mt-3">Reactive</h3>

<ul class="list-group">

  <li
  *ngFor="let route of reactiveMenu"
  class="list-group-item"
  [routerLink]="[ route.route]"
  routerLinkActive="active"
  >
    {{route.title}}
  </li>

</ul>

<h3 class="mt-3">Validaciones</h3>

<ul class="list-group">

  <li
  *ngFor="let route of authMenu"
  class="list-group-item"
  [routerLink]="[ route.route]"
  routerLinkActive="active"
  >
    {{route.title}}
  </li>

</ul>
